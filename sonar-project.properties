sonar.projectKey=NC1107_sad-cats-backend
sonar.organization=nc1107
sonar.host.url=https://sonarcloud.io

# Source layout
sonar.sources=src

# Exclusions
sonar.exclusions=node_modules/**,coverage/**,backups/**,src/db/migrations/**,src/db/seeds/**

# Coverage report (Jest produces lcov when `npm test -- --coverage` is run)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
